                            <div class="folder-details">

        <div id="image-modal" class="image-modal hidden">
            <span class="close-modal">&times;</span>
            <img class="modal-content" id="expanded-img" alt="Zoomed Image">
        </div>

        <audio id="bg-audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" loop></audio>
        <audio id="click-sound" src="https://www.soundjay.com/buttons/sounds/button-09.mp3"></audio>
        
        <script>
            const folder = document.getElementById('main-folder');
            const audio = document.getElementById('bg-audio');
            const clickSound = document.getElementById('click-sound');
            const muteBtn = document.getElementById('mute-btn');
            const muteIcon = muteBtn.querySelector('i');

            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('expanded-img');
            const galleryImgs = document.querySelectorAll('.folder-gallery img');

            folder.addEventListener('click', () => {
                folder.classList.toggle('open');
                
                document.body.classList.toggle('folder-is-open');
                
                if (folder.classList.contains('open')) {
                    clickSound.volume = 0.6;
                    clickSound.currentTime = 0;
                    clickSound.play().catch(e => console.log("Click sound prevented."));

                    audio.volume = 0.4;
                    audio.muted = false; 
                    audio.play().catch(e => console.log("Audio autoplay prevented by browser."));
                    
                    muteBtn.classList.remove('hidden');
                    muteIcon.className = 'fa fa-volume-up';
                } else {
                    audio.pause();
                    muteBtn.classList.add('hidden');
                }
            });

            function toggleMute() {
                if (audio.muted) {
                    audio.muted = false;
                    muteIcon.className = 'fa fa-volume-up';
                } else {
                    audio.muted = true;
                    muteIcon.className = 'fa fa-volume-off';
                }
            }

            galleryImgs.forEach(img => {
                img.addEventListener('click', function() {
                    modal.classList.remove('hidden');
                    setTimeout(() => modal.classList.add('active'), 10);
                    modalImg.src = this.src;
                });
            });

            modal.addEventListener('click', function(e) {
                if (e.target !== modalImg) {
                    modal.classList.remove('active');
                    setTimeout(() => modal.classList.add('hidden'), 300);
                }
            });
        </script>
