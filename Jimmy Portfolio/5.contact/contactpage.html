<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact | ColorVerse一緒</title>
        
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>ℛ</text></svg>">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        
        <link rel="stylesheet" href="../5.contact/contactpage.css">
    </head>
    <body>

        <div class="grid-skeleton no-nav">
            
            <header class="grid-header"> 
                <div class="header-inner">
                    <div class="header-left">
                        <a href="../index.html" title="Back to Home" class="header-skull-icon squared-arrow">
                            <i class="fa fa-arrow-left"></i>
                        </a>
                    </div>
                    
                    <div class="header-right">
                        <div class="header-logo-container">
                            <img src="../x.indexpictures/colorverselogo.png" alt="logo">
                        </div>
                        <p class="header-brand-text">ColorVerse 彩境坊</p>
                    </div>
                </div>
            </header>

            <main class="grid-main">
                <div class="portfolio-isolated-zone">
                    
                    <section class="about-page-container">
                        
                        <div class="about-detailed-card virtual-page scroll-pop">
                            
                            <h2 class="folder-label biography-edge-tab">Get In Touch</h2>
                            
                            <h1 class="biography-main-title">Contact Me</h1>
                            
                            <p class="contact-subtitle">If you have any questions, project inquiries, or just want to say hello, feel free to drop a message below.</p>

                            <form class="custom-contact-form" action="#" method="POST">
                                
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="name">Name</label>
                                        <input type="text" id="name" name="name" required placeholder="Your Full Name">
                                    </div>
                                    <div class="form-group">
                                        <label for="email">Email</label>
                                        <input type="email" id="email" name="email" required placeholder="Enter your email address">
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label for="subject">Subject</label>
                                    <input type="text" id="subject" name="subject" required placeholder="Project Inquiry or Topic">
                                </div>
                                
                                <div class="form-group">
                                    <label for="message">Message</label>
                                    <textarea id="message" name="message" rows="6" required placeholder="Please provide details about your inquiry, timeline, or any specific questions you might have..."></textarea>
                                </div>
                                
                                <button type="submit" class="about-more-btn form-submit-btn">
                                    <i class="fa fa-paper-plane"></i> Send Message
                                </button>
                                
                            </form>
                            
                        </div>
                        
                    </section>

                </div>
            </main>

            <footer class="grid-footer">
                <div class="footer-content">
                    <p>© Jaime Salcedo All Rights Reserved</p>
                </div>
                
                <div class="dock-target"></div>

                <button id="scrollTopBtn" title="Go to top">
                    <i class="fa fa-arrow-up"></i>
                </button>
            </footer>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                
                // --- PREVENT GLITCHING ON RESIZE ---
                let resizeTimer;
                window.addEventListener('resize', () => {
                    document.body.classList.add('resize-animation-stopper');
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        document.body.classList.remove('resize-animation-stopper');
                        checkDocking();
                    }, 400);
                });

                // --- POP EFFECT ON SCROLL ---
                const popElements = document.querySelectorAll('.scroll-pop');
                const popObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if(entry.isIntersecting){
                            entry.target.classList.add('show-pop');
                        } else {
                            entry.target.classList.remove('show-pop'); 
                        }
                    });
                }, { threshold: 0.1 });

                popElements.forEach(el => popObserver.observe(el));

                // --- 100% BULLETPROOF ZOOM MATH JS ---
                const topBtn = document.getElementById("scrollTopBtn");
                const dockTarget = document.querySelector('.dock-target');
                
                function checkDocking() {
                    const scrollPos = window.scrollY || document.documentElement.scrollTop;
                    const documentHeight = document.documentElement.scrollHeight;
                    const windowHeight = window.innerHeight;
                    
                    if (scrollPos > 100 && documentHeight > windowHeight) {
                        topBtn.classList.add("show-btn");
                    } else {
                        topBtn.classList.remove("show-btn");
                    }

                    if (dockTarget) {
                        const targetRect = dockTarget.getBoundingClientRect();
                        const bottomOffset = 10; 
                        const btnHeight = 40; 
                        const fixedTop = windowHeight - bottomOffset - btnHeight;

                        if (targetRect.top <= fixedTop) {
                            topBtn.classList.add('docked');
                        } else {
                            topBtn.classList.remove('docked');
                        }
                    }
                }

                window.addEventListener('scroll', checkDocking);
                checkDocking(); 

                topBtn.addEventListener("click", () => {
                    window.scrollTo({ top: 0, behavior: "smooth" });
                });
            });
        </script>
    </body>
</html>
