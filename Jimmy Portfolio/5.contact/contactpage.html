<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Contact | ColorVerse一緒</title>
        
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>ℛ</text></svg>">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        
        <link rel="stylesheet" href="../5.contact/contactpage.css">
    </head>
    <body>

        <div class="grid-skeleton no-nav">
            
            <header class="grid-header"> 
                <div class="header-inner">
                    <div class="header-left">
                        <a href="../index.html" title="Back to Home" class="header-skull-icon squared-arrow">
                            <i class="fa fa-arrow-left"></i>
                        </a>
                    </div>
                    
                    <div class="header-right">
                        <div class="header-logo-container">
                            <img src="../x.indexpictures/colorverselogo.png" alt="logo">
                        </div>
                        <p class="header-brand-text">ColorVerse 彩境坊</p>
                    </div>
                </div>
            </header>

            <main class="grid-main">
                <div class="portfolio-isolated-zone">
                    
                    <section class="about-page-container">
                        
                        <div class="about-detailed-card virtual-page">
                            
                            <h2 class="folder-label biography-edge-tab">Get In Touch</h2>
                            
                            <h1 class="biography-main-title">Contact Me</h1>
                            
                            <p class="contact-subtitle">If you have any questions, project inquiries, or just want to say hello, feel free to drop a message below.</p>

                            <form class="custom-contact-form" action="#" method="POST">
                                
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="name">Name</label>
                                        <input type="text" id="name" name="name" required placeholder="John Doe">
                                    </div>
                                    <div class="form-group">
                                        <label for="email">Email</label>
                                        <input type="email" id="email" name="email" required placeholder="john@example.com">
                                    </div>
                                </div>
                                
                                <div class="form-group">
                                    <label for="subject">Subject</label>
                                    <input type="text" id="subject" name="subject" required placeholder="Graphic Design Inquiry">
                                </div>
                                
                                <div class="form-group">
                                    <label for="message">Message</label>
                                    <textarea id="message" name="message" rows="6" required placeholder="Hello Jaime, I would like to discuss..."></textarea>
                                </div>
                                
                                <button type="submit" class="about-more-btn form-submit-btn">
                                    <i class="fa fa-paper-plane"></i> Send Message
                                </button>
                                
                            </form>
                            
                        </div>
                        
                    </section>

                </div>
            </main>

            <footer class="grid-footer">
                <div class="footer-content">
                    <p>© Jaime Salcedo All Rights Reserved</p>
                </div>
            </footer>
        </div>

        <script type="text/javascript">
        var Tawk_API=Tawk_API||{}, Tawk_LoadStart=new Date();
        (function(){
        var s1=document.createElement("script"),s0=document.getElementsByTagName("script")[0];
        s1.async=true;
        s1.src='https://embed.tawk.to/69d1d196ea58591c358a5e66/1jldplcv4';
        s1.charset='UTF-8';
        s1.setAttribute('crossorigin','*');
        s0.parentNode.insertBefore(s1,s0);
        })();
        </script>
    </body>
</html>
