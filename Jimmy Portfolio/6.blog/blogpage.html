<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Fun Zone | ColorVerse一緒</title>
        
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>ℛ</text></svg>">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        
        <link rel="stylesheet" href="../6.blog/blogpage.css"> 
    </head>
    <body>

        <div class="grid-skeleton no-nav">
            
            <header class="grid-header"> 
                <div class="header-inner">
                    <div class="header-left">
                        <a href="../index.html" title="Back to Home" class="header-skull-icon squared-arrow">
                            <i class="fa fa-arrow-left"></i>
                        </a>
                    </div>
                    
                    <div class="header-right">
                        <div class="header-logo-container">
                            <img src="../x.indexpictures/colorverselogo.png" alt="logo" class="hover-glow-logo">
                        </div>
                        <p class="header-brand-text hover-glow-text">ColorVerse 彩境坊</p>
                    </div>
                </div>
            </header>

            <main class="grid-main">
                <div class="portfolio-isolated-zone">
                    
                    <section class="about-page-container">
                        
                        <div class="about-detailed-card virtual-page scroll-pop">
                            
                            <h2 class="folder-label biography-edge-tab hover-glow-text">Fun Zone</h2>
                            <h1 class="biography-main-title hover-glow-text">Take a Break</h1>
                            
                            <p class="contact-subtitle hover-glow-text">We believe that taking a break is just as important as working hard. Kick back, relax, and watch a fun video!</p>

                            <div class="media-section" style="margin-bottom: 0;">
                                <div class="iframe-container">
                                    <iframe src="https://www.youtube.com/embed/jfKfPfyJRdk?autoplay=0" width="1920" height="1080" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen frameborder="0"></iframe>
                                </div>
                            </div>
                            
                        </div>
                        
                    </section>

                </div>
            </main>

            <footer class="grid-footer">
                <div class="footer-content">
                    <p class="hover-glow-text">© Jaime Salcedo All Rights Reserved</p>
                </div>
                
                <div class="dock-target"></div>

                <button id="scrollTopBtn" title="Go to top">
                    <i class="fa fa-arrow-up"></i>
                </button>
            </footer>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                
                // --- PREVENT GLITCHING ON RESIZE ---
                let resizeTimer;
                window.addEventListener('resize', () => {
                    document.body.classList.add('resize-animation-stopper');
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        document.body.classList.remove('resize-animation-stopper');
                        checkDocking();
                    }, 400);
                });

                // --- POP EFFECT ON SCROLL ---
                const popElements = document.querySelectorAll('.scroll-pop');
                const popObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if(entry.isIntersecting){
                            entry.target.classList.add('show-pop');
                        } else {
                            entry.target.classList.remove('show-pop'); 
                        }
                    });
                }, { threshold: 0.1 });

                popElements.forEach(el => popObserver.observe(el));

                // --- 100% BULLETPROOF ZOOM MATH JS ---
                const topBtn = document.getElementById("scrollTopBtn");
                const dockTarget = document.querySelector('.dock-target');
                
                function checkDocking() {
                    const scrollPos = window.scrollY || document.documentElement.scrollTop;
                    const documentHeight = document.documentElement.scrollHeight;
                    const windowHeight = window.innerHeight;
                    
                    if (scrollPos > 100 && documentHeight > windowHeight) {
                        topBtn.classList.add("show-btn");
                    } else {
                        topBtn.classList.remove("show-btn");
                    }

                    if (dockTarget) {
                        const targetRect = dockTarget.getBoundingClientRect();
                        
                        // Locked logic: Button is strictly 40px, Gap is strictly 10px globally
                        const bottomOffset = 10; 
                        const btnHeight = 40; 
                        
                        // Calculates exactly where the top pixel of the button sits on your screen
                        const fixedTop = windowHeight - bottomOffset - btnHeight;

                        if (targetRect.top <= fixedTop) {
                            topBtn.classList.add('docked');
                        } else {
                            topBtn.classList.remove('docked');
                        }
                    }
                }

                window.addEventListener('scroll', checkDocking);
                checkDocking(); 

                topBtn.addEventListener("click", () => {
                    window.scrollTo({ top: 0, behavior: "smooth" });
                });
            });
        </script>
    </body>
</html>
