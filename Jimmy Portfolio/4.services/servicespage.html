<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Services | ColorVerse一緒</title>
        
        <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>ℛ</text></svg>">
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
        
        <link rel="stylesheet" href="../4.services/servicespage.css">
    </head>
    <body>

        <div class="grid-skeleton no-nav">
            
            <header class="grid-header"> 
                <div class="header-inner">
                    <div class="header-left">
                        <a href="../index.html" title="Back to Home" class="header-skull-icon squared-arrow">
                            <i class="fa fa-arrow-left"></i>
                        </a>
                    </div>
                    
                    <div class="header-right">
                        <div class="header-logo-container">
                            <img src="../x.indexpictures/colorverselogo.png" alt="logo">
                        </div>
                        <p class="header-brand-text">ColorVerse 彩境坊</p>
                    </div>
                </div>
            </header>

            <main class="grid-main">
                <div class="portfolio-isolated-zone">
                    
                    <section class="about-page-container">
                        
                        <div class="about-detailed-card virtual-page scroll-pop">
                            
                            <h2 class="folder-label biography-edge-tab">Services & Pricing</h2>
                            
                            <h1 class="biography-main-title">Service and Pricing Plans</h1>

                            <div class="doc-actions">
                                <a href="https://docs.google.com/document/d/17BL-csYHfv1Q0oEr7-uZD3cVw1lMkNhRMR2LTwSH3-4/preview" target="_blank" class="about-more-btn">
                                    <i class="fa fa-arrows-alt"></i> View Full Screen
                                </a>
                                <a href="https://docs.google.com/document/d/17BL-csYHfv1Q0oEr7-uZD3cVw1lMkNhRMR2LTwSH3-4/export?format=pdf" class="about-more-btn">
                                    <i class="fa fa-download"></i> Download PDF
                                </a>
                            </div>
                            
                            <div class="doc-embed-container" id="docWrapper">
                                <iframe 
                                    class="doc-iframe"
                                    id="docIframe"
                                    src="https://docs.google.com/document/d/17BL-csYHfv1Q0oEr7-uZD3cVw1lMkNhRMR2LTwSH3-4/preview" 
                                    title="ColorVerse Services and Pricing"
                                    scrolling="no"
                                    frameborder="0">
                                </iframe>
                            </div>
                            
                        </div>
                        
                    </section>

                </div>
            </main>

            <footer class="grid-footer">
                <div class="footer-content">
                    <p>© Jaime Salcedo All Rights Reserved</p>
                </div>
                
                <div class="dock-target"></div>

                <button id="scrollTopBtn" title="Go to top">
                    <i class="fa fa-arrow-up"></i>
                </button>
            </footer>
        </div>

        <script>
            document.addEventListener('DOMContentLoaded', () => {
                
                // --- CUSTOM DOCUMENT SCALING ENGINE ---
                // Mathematically scales the 2-page iframe so it never cuts off
                function scaleDoc() {
                    const wrapper = document.getElementById('docWrapper');
                    const iframe = document.getElementById('docIframe');
                    
                    if (wrapper && iframe) {
                        const parentWidth = wrapper.parentElement.clientWidth;
                        const availableWidth = Math.min(parentWidth - 40, 850); 
                        
                        const defaultDocWidth = 850;
                        const defaultDocHeight = 2200; // Double height for 2 pages

                        const scale = availableWidth / defaultDocWidth;

                        iframe.style.transform = `scale(${scale})`;
                        wrapper.style.height = `${defaultDocHeight * scale}px`;
                        wrapper.style.width = `${availableWidth}px`;
                    }
                }

                // Run instantly on load
                scaleDoc();

                let resizeTimer;
                window.addEventListener('resize', () => {
                    document.body.classList.add('resize-animation-stopper');
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        document.body.classList.remove('resize-animation-stopper');
                        scaleDoc(); 
                        checkDocking(); 
                    }, 400);
                });

                // --- POP EFFECT ---
                const popElements = document.querySelectorAll('.scroll-pop');
                const popObserver = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if(entry.isIntersecting){
                            entry.target.classList.add('show-pop');
                        } else {
                            entry.target.classList.remove('show-pop'); 
                        }
                    });
                }, { threshold: 0.1 });

                popElements.forEach(el => popObserver.observe(el));

                // --- 100% BULLETPROOF SCROLL MATH ---
                const topBtn = document.getElementById("scrollTopBtn");
                const dockTarget = document.querySelector('.dock-target');
                
                function checkDocking() {
                    const scrollPos = window.scrollY || document.documentElement.scrollTop;
                    const documentHeight = document.documentElement.scrollHeight;
                    const windowHeight = window.innerHeight;
                    
                    if (scrollPos > 100 && documentHeight > windowHeight) {
                        topBtn.classList.add("show-btn");
                    } else {
                        topBtn.classList.remove("show-btn");
                    }

                    if (dockTarget) {
                        const targetRect = dockTarget.getBoundingClientRect();
                        const bottomOffset = 10; 
                        const btnHeight = 40; 
                        const fixedTop = windowHeight - bottomOffset - btnHeight;

                        if (targetRect.top <= fixedTop) {
                            topBtn.classList.add('docked');
                        } else {
                            topBtn.classList.remove('docked');
                        }
                    }
                }

                window.addEventListener('scroll', checkDocking);
                checkDocking();

                topBtn.addEventListener("click", () => {
                    window.scrollTo({ top: 0, behavior: "smooth" });
                });
            });
        </script>
    </body>
</html>
